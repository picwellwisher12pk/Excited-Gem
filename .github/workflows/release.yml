name: "Build and Release Extension"

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build and Package
        # Build production unpacked first, then package it
        run: |
          bun run build
          bun run package
          ls -R build/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/chrome-mv3-prod.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare BPP Keys
        run: |
          # Write normalized keys to a file to ensure JSON integrity
          echo '${{ secrets.SUBMIT_KEYS }}' | jq -c '{chrome: (.chrome | (if has("extId") then .extensionId = .extId | del(.extId) else . end))}' > bpp-keys.json

          # Final verification: Check that the file is valid JSON and has the ID
          jq -e '.chrome.extensionId' bpp-keys.json > /dev/null

      - name: Browser Platform Publisher
        uses: plasmohq/bpp@v3
        with:
          keys: bpp-keys.json
          zip: build/chrome-mv3-prod.zip
