name: "Build and Release Extension"

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build and Package
        # Build production unpacked first, then package it
        run: |
          bun run build
          bun run package
          ls -R build/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/chrome-mv3-prod.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare BPP Keys
        id: bpp_keys
        env:
          SUBMIT_KEYS: ${{ secrets.SUBMIT_KEYS }}
        run: |
          if [ -z "$SUBMIT_KEYS" ]; then
            echo "::error::SUBMIT_KEYS secret is empty!"
            exit 1
          fi

          # Normalize 'extId' to 'extensionId' automatically for BPP compatibility
          NORMALIZED=$(echo "$SUBMIT_KEYS" | jq -c '.chrome |= (if has("extId") then .extensionId = .extId | del(.extId) else . end)')

          echo "keys=$NORMALIZED" >> $GITHUB_OUTPUT

      - name: Browser Platform Publisher
        uses: plasmohq/bpp@v3
        with:
          keys: ${{ steps.bpp_keys.outputs.keys }}
          zip: build/chrome-mv3-prod.zip
